<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☣ DEAD TACTICS</title>
  <!-- Основной CSS (без @import для совместимости с file://) -->
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/game.css">
  <link rel="stylesheet" href="src/css/ui.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/screens.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-start" class="screen">
  <!-- Фон с анимацией -->
  <div id="menu-background" class="menu-background"></div>
  
  <!-- Центрированный контент -->
  <div class="menu-container">
    <h1 class="menu-title">☣ DEAD TACTICS</h1>
    <p class="menu-subtitle">ZOMBIE APOCALYPSE · TURN-BASED STRATEGY</p>
    
    <div class="menu-buttons">
      <button onclick="newGame()" class="menu-btn">▶ НОВАЯ ИГРА</button>
      <button onclick="continueGame()" class="menu-btn">▶ ПРОДОЛЖИТЬ</button>
      <button onclick="openSettings()" class="menu-btn">⚙ НАСТРОЙКИ</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН INTRO: ЛОР + ИМЯ -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-intro" class="screen">
  <div id="intro-text-container" class="overlay-box intro-text-container">
    <p id="intro-text" class="intro-text"></p>
  </div>
  <div id="intro-input-container" class="intro-input-container">
    <div id="knife-container" style="margin-bottom: 1rem;"></div>
    <p class="intro-input-label">На нём выгравировано:</p>
    <input type="text" id="player-name-input" class="intro-input" placeholder="Введи своё имя">
    <button onclick="savePlayerName()" class="btn-confirm">ПОДТВЕРДИТЬ</button>
  </div>
  <button id="intro-next-btn" class="btn-next" onclick="showNextIntroText()">ДАЛЕЕ →</button>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН 2: КАРТА МИРА -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-map">
  <!-- Верхняя панель: [👤 имя · ★ уровень] + [💰 золото] -->
  <div id="top-bar">
    <div class="top-bar-section">
      <span class="top-bar-icon">👤</span>
      <span id="top-bar-name">—</span>
      <span class="top-bar-divider">·</span>
      <span class="top-bar-icon">★</span>
      <span>Уровень</span>
      <span id="top-bar-level">1</span>
    </div>
    <div class="top-bar-section">
      <span class="top-bar-icon">💰</span>
      <span id="top-bar-gold">0</span>
    </div>
  </div>

  <!-- Контейнер карты с маркерами -->
  <div id="map-container" class="map-container">
    <svg id="map-route-svg" class="map-route-svg"></svg>
    <div id="map-levels" class="map-levels">
      <!-- маркеры уровней будут добавлены через JS -->
    </div>
  </div>

  <!-- Нижняя кнопка -->
  <div class="mt-2 text-center">
    <button onclick="goToSquad()" class="map-squad-btn">👥 МОЙ ОТРЯД</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН 3: ОТРЯД -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-squad">
  <div class="squad-header">
    <button onclick="showRecruitModal()" class="btn-recruit">➕ НАНЯТЬ</button>
    <button onclick="goToShop()" class="btn-shop">🏪 МАГАЗИН</button>
    <button onclick="goToMap()" class="btn-back">← НА КАРТУ</button>
  </div>

  <div class="squad-content">
    <div class="squad-units-container">
      <h3>Состав отряда</h3>
      <div id="squad-units" class="squad-units-grid">
        <!-- карточки юнитов -->
      </div>
    </div>
    
    <div class="squad-stats-container">
      <h3>Статистика отряда</h3>
      <div id="squad-stats"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН 3.5: МАГАЗИН -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-shop" class="screen">
  <div class="shop-header">
    <h2>🏪 МАГАЗИН</h2>
    <span id="shop-gold">💰 0</span>
  </div>
  
  <div class="shop-unit-selector">
    <label>Экипировать юнита:</label>
    <select id="shop-unit-select" onchange="shopSelectUnit(this.value)">
      <option value="">-- Выберите юнита --</option>
    </select>
  </div>
  
  <div class="shop-content">
    <div class="shop-section">
      <h3>🔫 Основное оружие</h3>
      <div id="shop-weapons" class="shop-items"></div>
    </div>
    <div class="shop-section">
      <h3>🩹 Защита и лечение</h3>
      <div id="shop-defense" class="shop-items"></div>
    </div>
    <div class="shop-section">
      <h3>🎒 Аксессуары</h3>
      <div id="shop-accessories" class="shop-items"></div>
    </div>
  </div>
  
  <button onclick="goToSquad()" class="btn-back">← К ОТРЯДУ</button>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН 4: ДЕТАЛИ ЮНИТА (ПОПАП) -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-unit-detail">
  <div class="unit-detail-panel">
    <div class="unit-detail-header">
      <h2 id="unit-detail-name">Юнит</h2>
      <button onclick="selectedSquadUnitId = null; showScreen('screen-squad'); renderSquadScreen();" class="btn-close">✕</button>
    </div>

    <div id="unit-detail-content" class="unit-detail-content">
      <!-- содержимое будет заполнено JS -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН 5: ПЕРЕД БОЕМ -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-level-start">
  <h2 id="level-start-title" class="level-start-title">Уровень</h2>
  <p id="level-start-desc" class="level-start-desc">Описание</p>

  <div class="overlay-box level-start-stats-box">
    <div id="level-start-stats"></div>
  </div>

  <div class="level-start-actions">
    <button onclick="goToMap()" class="btn-back">← НАЗАД</button>
    <button onclick="goToBattle(gameData.currentLevel)" class="btn-fight">⚔ В БОЙ</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ЭКРАН 6: БОЙ (ТЕКУЩАЯ МЕХАНИКА) -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="screen-battle">
  <div id="game-container">

    <!-- ПОЛЕ БОЯ -->
    <div id="grid-wrap">
      <div id="grid"></div>
    </div>

    <!-- САЙДБАР -->
    <div id="side-panel">

      <div class="panel-box">
        <div class="panel-label">Юнит</div>
        <div id="unit-info">
          <span class="text-muted">— выбери юнита —</span>
        </div>
      </div>

      <button id="btn-end-turn" disabled>⏭ ЗАВЕРШИТЬ ХОД</button>
      <button id="btn-restart" class="danger">↺ РЕСТАРТ</button>

      <div class="panel-box">
        <div id="log"></div>
      </div>

    </div>
  </div>
</div>

<!-- СКРИПТЫ: порядок важен! -->

<!-- Сначала загружаем конфиги (до всех остальных скриптов!) -->
<script src="src/js/config/game-config.js"></script>
<script src="src/js/config/ui-constants.js"></script>
<script src="src/js/core/effects.js"></script>
<script src="src/js/core/state.js"></script>
<script src="src/js/data.js"></script>

<!-- SCREENS: рендеры -->
<script src="src/js/screens/screenIntro.js"></script>
<!-- SCREENS: роутинг (зависит от screenIntro.js для startMenuBackgroundAnimation) -->
<script src="src/js/screens/screens.js"></script>
<script src="src/js/screens/screenMap.js"></script>
<script src="src/js/screens/screenSquad.js"></script>
<script src="src/js/screens/screenShop.js"></script>
<script src="src/js/screens/screenLevel.js"></script>
<script src="src/js/screens/screenDetail.js"></script>

<script src="src/js/units.js"></script>
<script src="src/js/core/helpers.js"></script>

<!-- RENDER: core + battle -->
<script src="src/js/render/render.js"></script>
<script src="src/js/render/battle.js"></script>

<script src="src/js/ui.js"></script>
<script src="src/js/audio.js"></script>
<script src="src/js/ai.js"></script>
<script src="src/js/game.js"></script>
<!-- main.js удалён - теперь используем обычные скрипты вместо ES modules -->

</body>
</html>
